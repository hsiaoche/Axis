<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點線極簡：一日行程滾動導覽</title>
    <style>
        /* 基礎重置與極簡色彩設定 */
        :root {
            --bg-color: #000000;      /* 深邃黑底色 */
            --text-color: #ffffff;    /* 純白文字 */
            --text-muted: #666666;    /* 淺灰文字 (非當前時段) */
            --accent-color: #ffffff;  /* 點線的主要顏色 (白色) */
            --timeline-width: 250px;  /* 左側時間軸寬度 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: none; /* Firefox 隱藏滾動條 */
        }

        *::-webkit-scrollbar {
            display: none; /* Chrome, Safari 隱藏滾動條 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            overflow: hidden; /* 防止最外層滾動，滾動交由 main 容器處理 */
        }

        /* 佈局架構：左右分格 */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* =========================================
           左側：固定時間軸導覽列
           ========================================= */
        .timeline-sidebar {
            width: var(--timeline-width);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            align-items: center; /* 垂直置中整個選單 */
            padding: 0 40px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timeline-nav {
            display: flex;
            flex-direction: column;
            width: 100%;
            position: relative;
        }

        /* 連接時間點的細線 */
        .timeline-nav::before {
            content: '';
            position: absolute;
            left: 0; /* 線的位置與點對齊 */
            top: 15px;
            bottom: 15px;
            width: 1px;
            background-color: var(--text-muted);
            z-index: 0;
        }

        .nav-item {
            position: relative;
            padding: 20px 0 20px 30px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 300;
            transition: all 0.3s ease;
            z-index: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* 時間軸上的「點」 */
        .nav-item::before {
            content: '';
            position: absolute;
            left: -4px; /* 調整點在線上的位置 */
            width: 9px;
            height: 9px;
            background-color: var(--bg-color);
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        /* 滑鼠懸停效果 */
        .nav-item:hover {
            color: var(--accent-color);
        }
        .nav-item:hover::before {
            border-color: var(--accent-color);
        }

        /* 「目前所在時間段」的凸顯樣式 */
        .nav-item.active {
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: 500;
        }

        .nav-item.active::before {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transform: scale(1.3);
        }


        /* =========================================
           右側：全螢幕行程內容區
           ========================================= */
        .content-area {
            flex-grow: 1;
            height: 100vh;
            overflow-y: scroll; /* 允許右側獨立滾動 */
            scroll-snap-type: y mandatory; /* 開啟 CSS Scroll Snap，確保每次停在區塊頂端 */
            scroll-behavior: smooth; /* 點擊導航時平滑滾動 */
        }

        /* 每個行程畫面佔滿整個螢幕高度 */
        .section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start; /* 滾動停止時對齊區塊頂部 */
            display: flex;
            flex-direction: column;
            padding: 60px;
            position: relative;
        }

        /* 內部內容的排版，呼應點線極簡風格 */
        .section-header {
            margin-bottom: 40px;
        }

        .section-time {
            font-size: 1.2rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        /* 標題旁的小橫線裝飾 */
        .section-time::after {
            content: '';
            display: inline-block;
            width: 50px;
            height: 1px;
            background-color: var(--text-muted);
            margin-left: 20px;
        }

        .section-title {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* 模擬流程圖的線條與點 (可選：在內容區增加裝飾) */
        .process-graph {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 10px;
        }

        .graph-node {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .node-circle {
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            margin-right: 20px;
        }

        .node-text {
            font-size: 1.5rem;
            font-weight: 300;
        }

        .graph-line {
            width: 2px;
            height: 40px;
            background-color: var(--text-muted);
            margin-left: 5px;
            margin-top: -30px;
            margin-bottom: 10px;
        }


    </style>
</head>
<body>

    <div class="app-container">
        
        <nav class="timeline-sidebar">
            <div class="timeline-nav">
                <a href="#time-0900" class="nav-item active">09:00</a>
                <a href="#time-1130" class="nav-item">11:30</a>
                <a href="#time-1400" class="nav-item">14:00</a>
                <a href="#time-1800" class="nav-item">18:00</a>
                <a href="#time-2100" class="nav-item">21:00</a>
            </div>
        </nav>

        <main class="content-area" id="scroll-container">
            
            <section id="time-0900" class="section">
                <header class="section-header">
                    <div class="section-time">09:00 START</div>
                    <h2 class="section-title">晨間啟程與集合</h2>
                </header>
                <div class="process-graph">
                    <div class="graph-node">
                        <div class="node-circle"></div>
                        <div class="node-text">車站出口集合</div>
                    </div>
                    <div class="graph-line"></div>
                    <div class="graph-node">
                        <div class="node-circle" style="background-color: var(--accent-color);"></div>
                        <div class="node-text">確認今日裝備與路線</div>
                    </div>
                </div>
            </section>

            <section id="time-1130" class="section">
                <header class="section-header">
                    <div class="section-time">11:30 EXPLORE</div>
                    <h2 class="section-title">展覽參訪與靈感探索</h2>
                </header>
                <div class="process-graph">
                    <div class="graph-node">
                        <div class="node-circle"></div>
                        <div class="node-text">進入展區</div>
                    </div>
                    <div class="graph-line"></div>
                    <div class="graph-node">
                        <div class="node-circle"></div>
                        <div class="node-text">常設展導覽</div>
                    </div>
                </div>
            </section>

            <section id="time-1400" class="section">
                <header class="section-header">
                    <div class="section-time">14:00 BREAK</div>
                    <h2 class="section-title">午餐與咖啡時光</h2>
                </header>
                 <div class="process-graph">
                     <p style="font-size: 1.2rem; font-weight: 300; color: #aaa; max-width: 600px;">
                        在極簡的空間中，享受單品咖啡的純粹風味。沉澱早上的思緒，準備下午的行程。
                     </p>
                 </div>
            </section>

            <section id="time-1800" class="section">
                <header class="section-header">
                    <div class="section-time">18:00 EVENING</div>
                    <h2 class="section-title">工藝巡禮與採購</h2>
                </header>
                 <div class="process-graph">
                    <div class="graph-node">
                        <div class="node-circle"></div>
                        <div class="node-text">抵達商圈</div>
                    </div>
                    <div class="graph-line"></div>
                    <div class="graph-node">
                        <div class="node-circle" style="background-color: var(--accent-color);"></div>
                        <div class="node-text">選物店尋寶</div>
                    </div>
                </div>
            </section>

            <section id="time-2100" class="section">
                <header class="section-header">
                    <div class="section-time">21:00 END</div>
                    <h2 class="section-title">晚餐與歸途</h2>
                </header>
                 <div class="process-graph">
                     <p style="font-size: 1.2rem; font-weight: 300; color: #aaa; max-width: 600px;">
                        整理今日的收穫，在安靜的夜色中踏上歸途。
                     </p>
                 </div>
            </section>

        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sections = document.querySelectorAll(".section");
            const navItems = document.querySelectorAll(".nav-item");
            const scrollContainer = document.getElementById("scroll-container");

            // 1. Intersection Observer 邏輯：監聽哪個 section 進入畫面
            const observerOptions = {
                root: scrollContainer, // 指定滾動容器
                rootMargin: "0px",
                threshold: 0.5 // 當 section 至少有 50% 進入容器畫面時觸發
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // 取得當前進入畫面的 section ID
                        const currentId = entry.target.getAttribute("id");
                        
                        // 移除所有選單的 active 狀態
                        navItems.forEach(item => item.classList.remove("active"));
                        
                        // 找到對應的 a 連結，並加上 active 狀態
                        const activeLink = document.querySelector(`.nav-item[href="#${currentId}"]`);
                        if (activeLink) {
                            activeLink.classList.add("active");
                        }
                    }
                });
            }, observerOptions);

            // 開始監聽所有的 section
            sections.forEach(section => {
                observer.observe(section);
            });

            // 2. 點擊導航時的平滑滾動修正 (可選，因 CSS scroll-behavior: smooth 已處理大部分)
            // 這裡確保點擊連結時，會平滑過渡而不會產生突兀的跳轉
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetSection = document.getElementById(targetId);
                    
                    targetSection.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                });
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis / 東京同步計畫</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.3);
            --accent-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: sans-serif; overflow: hidden; }

        /* 全螢幕投影片架構 */
        .container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .container::-webkit-scrollbar { display: none; }

        .slide {
            height: 100vh;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 將左右兩塊視為一個整體置中 */
            max-width: 900px;
            margin: 0 auto;
            padding: 0 40px;
            gap: 60px;
        }

        /* 左側：精簡版時間軸 (佔畫面中段 1/3) */
        .axis-sidebar {
            width: 80px;
            height: 33vh; /* 剛好 1/3 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 15px;
            gap: 15px;
        }
        .axis-node {
            height: 1px;
            background: var(--text-muted);
            width: 20px;
            transition: all 0.3s;
        }
        .axis-node.active { background: var(--text-primary); width: 40px; height: 2px; }
        .node-label { font-size: 0.7rem; color: var(--text-muted); }
        .node-label.active { color: var(--text-primary); }

        /* 右側：內容卡片 */
        .slide-content { flex: 1; }
        
        /* 頁頂切換器 */
        .nav-header {
            position: fixed; top: 30px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 10;
        }
    </style>
</head>
<body>

    <nav class="nav-header" id="nav-selector"></nav>

    <main class="container" id="main-container">
        </main>

    <script>
        // 渲染邏輯
        fetch('data.json').then(r => r.json()).then(data => {
            const container = document.getElementById('main-container');
            const nav = document.getElementById('nav-selector');

            // 生成投影片
            data.schedule.forEach((point, i) => {
                const slide = document.createElement('section');
                slide.className = 'slide';
                slide.innerHTML = `
                    <aside class="axis-sidebar">
                        <div class="axis-node ${i===0?'active':''}"></div>
                        <div class="node-label ${i===0?'active':''}">${point.timeLabel}</div>
                        <div class="axis-node"></div>
                    </aside>
                    <article class="slide-content">
                        <h1>${point.routes.a.title}</h1>
                        <p>${point.routes.a.description}</p>
                    </article>
                `;
                container.appendChild(slide);
            });
        });
    </script>
</body>
</html>

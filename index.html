<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis / 多線同步計畫</title>
    <style>
        /* =========================================
           1. Design Tokens (極簡設計變數)
           ========================================= */
        :root {
            --bg-color: #050505;       
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4); 
            --line-color: rgba(255, 255, 255, 0.2);
            --accent-color: #ffffff;
            --timeline-width: 220px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden; 
        }

        .scroll-container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* =========================================
           2. Floating Elements (浮動控制項)
           ========================================= */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--text-muted);
            z-index: 999;
            transition: opacity 0.5s;
        }

        .selector-container {
            position: fixed;
            top: 40px;
            right: 60px;
            z-index: 100;
            display: flex;
            gap: 10px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid var(--line-color);
            transition: opacity 0.3s, transform 0.3s;
        }

        .selector-container.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            position: absolute; 
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }

        .toggle-btn:hover { color: var(--text-primary); }
        .toggle-btn.active {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        /* 呼吸燈 (純粹正圓) */
        .time-anchor-btn {
            position: fixed;
            bottom: 40px;
            right: 60px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: transparent;
            border: none; 
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
        }

        .time-anchor-btn::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* =========================================
           3. Layout Architecture (左右佈局)
           ========================================= */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            opacity: 0; 
            transition: opacity 0.8s ease;
        }

        /* 左側：水平線段時間軸 (依照手稿重構) */
        .sidebar {
            width: var(--timeline-width);
            height: 100vh;
            display: flex;
            align-items: center;
            padding-left: 60px;
            position: relative;
            z-index: 50;
        }

        .timeline-nav {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .nav-item {
            position: relative;
            padding: 24px 0 24px 30px; /* 留出左側線段空間 */
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        /* 水平線段 (Dashes) 取代原有的圓點與垂直線 */
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            width: 12px;
            height: 1px;
            background-color: var(--line-color);
            transition: all 0.3s ease;
        }

        .nav-item:hover { color: var(--text-primary); }
        .nav-item:hover::before { width: 18px; background-color: var(--text-primary); }

        .nav-item.active {
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 500;
        }

        .nav-item.active::before {
            width: 24px;
            height: 2px;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        /* 右側：全螢幕滾動區 (除錯：完美置中磁吸) */
        .content-area {
            flex-grow: 1;
            height: 100vh;
            overflow-y: auto; 
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .section {
            height: 100vh;
            width: 100%;
            /* 修正為 center 確保上下完美對齊不跑版 */
            scroll-snap-align: center; 
            scroll-snap-stop: always;
            display: flex;
            align-items: center; 
            padding: 0 80px;
            position: relative;
        }

        .section-track {
            display: flex;
            width: 100%;
            gap: 60px;
            max-height: 85vh;
        }

        /* =========================================
           4. Content Styling (內容與首頁排版)
           ========================================= */
        .route-content {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
            overflow-y: auto;
            padding-right: 15px;
        }
        
        .route-content::-webkit-scrollbar { display: none; }

        body[data-active-route="a"] .content-route-a { display: block; }
        body[data-active-route="b"] .content-route-b { display: block; }
        body[data-active-route="shop"] .content-route-shop { display: block; }
        body[data-active-route="intro"] .content-route-intro { display: block; }
        body[data-active-route="dug"] .content-route-dug { display: block; }
        .content-route-all { display: block !important; }

        .time-header {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }
        
        .time-header::after {
            content: '';
            display: inline-block;
            width: 40px;
            height: 1px;
            background-color: var(--line-color);
            margin-left: 20px;
        }

        .title {
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        /* 總覽頁的純文字幾何流程圖 */
        .flow-diagram {
            font-family: monospace;
            font-size: 1.2rem;
            color: var(--text-primary);
            white-space: pre-wrap; /* 保留 JSON 裡的換行排版 */
            line-height: 1.5;
            letter-spacing: 2px;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .meta-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-left: 1px solid var(--line-color);
            padding-left: 15px;
        }

        .description {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.8;
            white-space: pre-line;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border: 1px solid var(--line-color);
            border-radius: 50px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            background: transparent;
        }

        .nav-btn:hover {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           5. 響應式佈局
           ========================================= */
        @media (min-width: 900px) {
            .selector-container { display: none !important; }
            .route-content {
                display: block !important; 
                flex: 1; 
            }
            .content-route-all {
                flex: 1 1 100%;
                display: flex;
                flex-direction: column;
            }
            .content-route-all .title::before {
                content: '';
                display: block;
                width: 100px;
                height: 1px;
                background: var(--accent-color);
                margin-bottom: 20px;
            }
        }

        @media (max-width: 899px) {
            .app-layout { flex-direction: column; }
            .sidebar {
                width: 100vw;
                height: auto;
                padding: 10px 20px;
            }
            .timeline-nav { flex-direction: row; overflow-x: auto; scroll-snap-type: x mandatory; }
            
            /* 手機版改回底部橫線對齊 */
            .nav-item { padding: 10px 20px; scroll-snap-align: start; }
            .nav-item::before { display: none; }
            .nav-item.active { border-bottom: 2px solid var(--accent-color); padding-bottom: 8px; }

            .selector-container { top: 70px; right: 50%; transform: translateX(50%); width: max-content; }
            .selector-container.hidden { transform: translate(50%, -10px); }

            .time-anchor-btn { bottom: 30px; right: 30px; width: 45px; height: 45px; }

            .section { padding: 0 40px; }
            .section-track { flex-direction: column; }
            .title { font-size: 2.2rem; }
            .description { max-width: 100%; }
        }
    </style>
</head>
<body data-active-route="a" data-active-night-route="shop">

    <div id="loader">SYNCING DATA...</div>

    <div id="day-selector" class="selector-container hidden"></div>
    <div id="night-selector" class="selector-container hidden"></div>

    <button class="time-anchor-btn" onclick="scrollToCurrentTime()" title="返回當下時間"></button>

    <div class="app-layout" id="app-layout">
        <nav class="sidebar scroll-container">
            <div class="timeline-nav" id="timeline-nav">
                </div>
        </nav>
        <main class="content-area scroll-container" id="scroll-area">
            </main>
    </div>

    <script>
        const state = {
            dayRoute: sessionStorage.getItem('axisDayRoute') || 'a',
            nightRoute: sessionStorage.getItem('axisNightRoute') || 'shop'
        };

        document.addEventListener("DOMContentLoaded", () => {
            fetch(`data.json?v=${new Date().getTime()}`)
                .then(response => {
                    if(!response.ok) throw new Error("JSON Fetch Failed");
                    return response.json();
                })
                .then(data => {
                    renderUI(data);
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('app-layout').style.opacity = '1';
                        initObservers();
                        applySavedState();
                    }, 500);
                })
                .catch(error => {
                    document.getElementById('loader').innerText = "DATA SYNC FAILED.";
                    console.error("載入 JSON 發生錯誤，請確認檔案是否存在並使用 Live Server 運行。", error);
                });
        });

        function renderUI(data) {
            renderSelectors('day-selector', data.config.dayRoutes, 'day');
            renderSelectors('night-selector', data.config.nightRoutes, 'night');

            const navContainer = document.getElementById('timeline-nav');
            const scrollArea = document.getElementById('scroll-area');

            // 1. 動態插入「路線首頁」 (Overview)
            navContainer.insertAdjacentHTML('beforeend', `<a href="#time-overview" class="nav-item active">INFO</a>`);
            
            let overviewRoutesHTML = '';
            data.config.dayRoutes.forEach(route => {
                if(route.overview) {
                    let metaHTML = route.overview.meta.map(m => `<span>${m}</span>`).join('');
                    overviewRoutesHTML += `
                        <div class="route-content content-route-${route.id}">
                            <div class="time-header">OVERVIEW / 路線總覽</div>
                            <h1 class="title">${route.overview.title}</h1>
                            <div class="flow-diagram">${route.overview.flow}</div>
                            <div class="meta-info">${metaHTML}</div>
                        </div>
                    `;
                }
            });

            scrollArea.insertAdjacentHTML('beforeend', `
                <section id="time-overview" class="section" data-phase="overview">
                    <div class="section-track">
                        ${overviewRoutesHTML}
                    </div>
                </section>
            `);

            // 2. 動態插入各時間節點行程
            data.schedule.forEach(point => {
                navContainer.insertAdjacentHTML('beforeend', `<a href="#${point.timeId}" class="nav-item">${point.timeLabel}</a>`);

                let routesHTML = '';
                for (const [routeKey, routeData] of Object.entries(point.routes)) {
                    let metaHTML = routeData.meta.map(m => `<span>${m}</span>`).join('');
                    let btnsHTML = routeData.links.map(link => 
                        `<a href="${link.url}" target="_blank" class="nav-btn">${link.label}</a>`
                    ).join('');

                    routesHTML += `
                        <div class="route-content content-route-${routeKey}">
                            <div class="time-header">${point.timeLabel} / ${point.action}</div>
                            <h2 class="title">${routeData.title}</h2>
                            <div class="meta-info">${metaHTML}</div>
                            <p class="description">${routeData.description}</p>
                            <div class="btn-group">${btnsHTML}</div>
                        </div>
                    `;
                }

                scrollArea.insertAdjacentHTML('beforeend', `
                    <section id="${point.timeId}" class="section" data-phase="${point.phase}">
                        <div class="section-track">
                            ${routesHTML}
                        </div>
                    </section>
                `);
            });
        }

        function renderSelectors(containerId, routesArray, phase) {
            const container = document.getElementById(containerId);
            routesArray.forEach(route => {
                const btn = document.createElement('button');
                btn.className = `toggle-btn`;
                btn.innerText = route.label;
                btn.dataset.route = route.id;
                btn.onclick = (e) => setRoute(route.id, phase, e.target);
                container.appendChild(btn);
            });
        }

        function setRoute(routeId, phase, btnElement) {
            const container = btnElement.parentElement;
            container.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            if (phase === 'day') {
                document.body.setAttribute('data-active-route', routeId);
                sessionStorage.setItem('axisDayRoute', routeId);
            } else {
                document.body.setAttribute('data-active-night-route', routeId);
                document.body.setAttribute('data-active-route', routeId); 
                sessionStorage.setItem('axisNightRoute', routeId);
            }
        }

        function applySavedState() {
            const savedDayBtn = document.querySelector(`#day-selector .toggle-btn[data-route="${state.dayRoute}"]`);
            if(savedDayBtn) savedDayBtn.classList.add('active');
            
            const savedNightBtn = document.querySelector(`#night-selector .toggle-btn[data-route="${state.nightRoute}"]`);
            if(savedNightBtn) savedNightBtn.classList.add('active');
            
            document.body.setAttribute('data-active-route', state.dayRoute);
        }

        function initObservers() {
            const sections = document.querySelectorAll(".section");
            const navItems = document.querySelectorAll(".nav-item");
            const scrollArea = document.getElementById("scroll-area");
            const daySelector = document.getElementById("day-selector");
            const nightSelector = document.getElementById("night-selector");

            // 使用精準的 50% 邊界捕捉置中物件
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute("id");
                        const phase = entry.target.getAttribute("data-phase");

                        navItems.forEach(item => item.classList.remove("active"));
                        const activeLink = document.querySelector(`.nav-item[href="#${id}"]`);
                        if (activeLink) {
                            activeLink.classList.add("active");
                            // 若左側時間軸超過螢幕高度，自動滾動對齊
                            activeLink.scrollIntoView({ behavior: "smooth", block: "nearest" });
                        }

                        if (phase === "day" || phase === "overview") {
                            daySelector.classList.remove("hidden");
                            nightSelector.classList.add("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisDayRoute') || 'a');
                        } else if (phase === "night") {
                            daySelector.classList.add("hidden");
                            nightSelector.classList.remove("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisNightRoute') || 'shop');
                        } else {
                            daySelector.classList.add("hidden");
                            nightSelector.classList.add("hidden");
                        }
                    }
                });
            }, { root: scrollArea, rootMargin: "-49% 0px -49% 0px", threshold: 0 });

            sections.forEach(section => observer.observe(section));

            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.getElementById(this.getAttribute('href').substring(1)).scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        function scrollToCurrentTime() {
            const currentHour = new Date().getHours();
            let targetId = "time-10"; 
            
            if (currentHour >= 22 || currentHour < 4) targetId = "time-22";
            else if (currentHour >= 18) targetId = "time-18";
            else if (currentHour >= 15) targetId = "time-15";
            else if (currentHour >= 13) targetId = "time-13";
            else if (currentHour >= 11) targetId = "time-11";
            else targetId = "time-overview";

            const targetSection = document.getElementById(targetId);
            if (targetSection) targetSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
